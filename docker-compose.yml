services:
  db:
    image: postgres:15-alpine
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ./db-data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    networks:
      - app-network
  ai-service:
    build: ./ai-service
    ports:
      - "8000:8000"
    networks:
      - app-network
    depends_on:
      - db
  blockchain-service:
    build: ./blockchain-service
    container_name: blockchain-service
    ports:
      - "9000:9000"
    networks:
      - app-network
    depends_on:
      - db
  api-gateway:
    build: ./api-gateway
    env_file:
      - .env
    volumes:
      - ./api-gateway:/app
    ports:
      - "3000:3000"
    networks:
      - app-network
    depends_on:
      - db
      - ai-service
      - blockchain-service
networks:
  app-network:
    driver: bridge
